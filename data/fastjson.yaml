profile:
    categories:
        I:
            "1": JsonFormat
            "2": Float
            "3": Long
            "4": Date
            "5": String
            "6": Enum
            "7": ClassType
            "8": Feature
            "9": Quotation
        O:
            "1": Exception
            "2": Float
            "3": Long
            "4": Date
            "5": String
            "6": Enum
    choices:
        I:
            "1":
                "1": Object
                "2": List
                "3": Valid JSON string delete some symbols
                "4": Invalid JSON string
            "2":
                '*': Any choice except NA
                "1": Normal
                "2": Overflow
                "3": "Null"
                "4": Does not exist
                NA: Not applicable
            "3":
                '*': Any choice except NA
                "1": Normal
                "2": Overflow
                "3": "Null"
                "4": Does not exist
                NA: Not applicable
            "4":
                '*': Any choice except NA
                "1": yyyy-MM-dd
                "2": yyyy-MM-dd HH:mm:ss
                "3": yyyy-MM-dd HH:mm:ss.SSS
                "4": "Null"
                "5": Does not exist
                NA: Not applicable
            "5":
                '*': Any choice except NA
                "1": String without escape characters
                "2": Include escape characters, such as \\
                "3": "Null"
                "4": Does not exist
                NA: Not applicable
            "6":
                '*': Any choice except NA
                "1": Existing enum data
                "2": Non-existent enum data
                "3": Does not exist
                NA: Not applicable
            "7":
                '*': Any choice except NA
                "1": xxx.class
                "2": new TypeReference<xxx>(){}
                NA: Not applicable
            "8":
                '*': Any choice except NA
                "1": No feature
                "2": AllowUnQuotedFieldNames
                "3": AllowSingleQuotes
                "4": AllowISO8601DateFormat
                "5": InitStringFieldAsEmpty
            "9":
                '*': Any choice except NA
                "1": The field names are wrapped in double quotes
                "2": The field names are wrapped in single quotes
                "3": The field names are exposed
                NA: Not applicable
        O:
            "1":
                "1": No exception raised
                "2": JSONException raised
            "2":
                "1": Almost equal to input
                "2": "0"
                NA: Not applicable
            "3":
                "1": Equal to input
                "2": "0"
                NA: Not applicable
            "4":
                "1": Equal to input
                "2": "Null"
                NA: Not applicable
            "5":
                "1": Equal to input
                "2": "Null"
                NA: Not applicable
            "6":
                "1": Equal to input
                "2": "Null"
                NA: Not applicable
