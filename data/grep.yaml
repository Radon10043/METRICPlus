profile:
  categories:
    I:
      "1": "type of Expression"
      "2": "Type of building block (b1)"
      "3": "Type of building block b2"
      "4": "When I-2 and I-3 takes the same type of choice, b2 takes the same value as b1"
      "5": "Invert the sense of list expression"
      "6": "Repetition operators"
      "7": "Back Reference"
      "8": "Anchors"
    O:
      "1": "Restriction on the position of matched string"
      "2": "Match null char"
      "3": "Match strings with only one character (C)"
      "4": "Set of possible values of C-alphabets"
      "5": "Set of possible values of C- digits"
      "6": "Set of possible values of C- symbols"
      "7": "Match strings with only two characters (C1 C2)"
      "8": "Set of possible values of C1-alphabets"
      "9": "Set of possible values of C1- digits"
      "10": "Set of possible values of C1- symbols"
      "11": "Set of possible values of C2-alphabets"
      "12": "Set of possible values of C2- digits"
      "13": "Set of possible values of C2- symbols"
  choices:
    I:
      "1":
        "a": "a normal expression with one building block (b1)"
        "b": "a list expression with one building block ([b1])"
        "c": "a list expression with two building blocks ([b1 b2])"
        "d": "a normal expression <alternation> another normal expression (b1 | b2)"
        "e": "a list expression <alternation> another normal expression ([b1] | b2)"
        "f": "a normal expression <concatenation> another normal expression (b1 b2)"
        "g": "a list expression <concatenation> another normal expression ([b1] b2)"
      "2":
        "a": "alphabets (V_A1)"
        "b": "digits (V_D1)"
        "c": "matchers for punctuation characters V_S1"
        "d": "blank chars (V_B1)  (a space or a tab)"
        "e": "\\w"
        "f": "\\W"
        "g": "."
        "h": "[:alnum:]"
        "i": "[:alpha:]"
        "j": "[:blank:]"
        "k": "[:cntrl:]"
        "l": "[:digit:]"
        "m": "[:graph:]"
        "n": "[:lower:]"
        "o": "[:print:]"
        "p": "[:punct:]"
        "q": "[:space:]"
        "r": "[:upper:]"
        "s": "[:xdigit:]"
        "t": "a subrange of 0-9"
        "u": "a subrange of a-z"
        "v": "a subrange of A-Z"
      "3":
        "*": "Any choice except NA"
        "a": "alphabets (V_A2)"
        "b": "digits (V_D2)"
        "c": "matchers for punctuation characters V_S2"
        "d": "blank chars (V_B2)  (a space or a tab)"
        "e": "\\w"
        "f": "\\W"
        "g": "."
        "h": "[:alnum:]"
        "i": "[:alpha:]"
        "j": "[:blank:]"
        "k": "[:cntrl:]"
        "l": "[:digit:]"
        "m": "[:graph:]"
        "n": "[:lower:]"
        "o": "[:print:]"
        "p": "[:punct:]"
        "q": "[:space:]"
        "r": "[:upper:]"
        "s": "[:xdigit:]"
        "t": "a subrange of 0-9"
        "u": "a subrange of a-z"
        "v": "a subrange of A-Z"
      "4":
        "*": "Any choice except NA"
        "a": "no"
        "b": "yes"
      "5":
        "*": "Any choice except NA"
        "a": "no"
        "b": "yes"
      "6":
        "a": "does not exist"
        "b": "?"
        "c": "*"
        "d": "+"
        "e": "{0}"
        "f": "{1}"
        "g": "{2}"
        "h": "{0, 1}"
        "i": "{1, 2}"
        "j": "{0, 2}"
        "k": "{0, }"
        "l": "{1, }"
        "m": "{2, }"
      "7":
        "a": "no back reference"
        "b": "\\1"
      "8":
        "a": "no anchor"
        "b": "\"\\b\" at the beginning of a word char  / “\\b” at the end of a non word char"
        "c": "\"\\b\" at the end of a word char / \"\\b\" at the beginning of a non word char"
        "d": "a pair of \"\\b\" that encloses an expression (matches a word)"
        "e": "\"\\B\" at the beginning of a word char / \"\\B\" at the end of a nonword char"
        "f": "\"\\B\" at the end of an expression / \"\\B\" at the beginning of a nonword char"
        "g": "a pair of \"\\B\" that encloses an expression"
        "h": "\"\\<\" at the beginning of a word constitute char / \"\\<\" at the end of a nonword char (\\<w  / @\\< )"
        "i": "\"\\>\" at the end of a word constitute char  /  \"\\>\" at the beginning of a nonword char"
        "j": "a word char enclosed by \"\\<\" and \"\\>\" (matches a word)/ a nonword char enclosed by \"\\>\" and \"\\<\""
        "k": "\"^\" at the beginning of an expression (matches the empty string at the beginning of a line)"
        "l": "\"$\" at the end of an expression (matches the empty string at the end of a line)"
        "m": "an expression enclosed by \"^\" and \"$\""
        "n": "\"\\<\" at the end of a word constitute char / \"\\<\" at the beginning of a nonword char (w\\<  / \\<@ )"
        "o": "\"\\>\" at the beginning of a word constitute char  /  \"\\>\" at the end of a nonword char"
        "p": "a word char enclosed by \"\\>\" and \"\\<\" (matches a word)/ a nonword char enclosed by \"\\<\" and \"\\>\""
    O:
      "1":
        "a": "no restriction on the position of matched string"
        "b": "presents at the beginning of a word (\\ba / @\\b)"
        "c": "presents at the end of a word (a\\b / \\b@)"
        "d": "the entire word / presents at the middle of two words(\\b a \\b  /  \\b @ \\b)"
        "e": "do not present at the beginning of a word (\\Ba / @\\B)"
        "f": "do not present at the end of a word (\\Ba / @\\B)"
        "g": "presents at the middle of a word/ non word char: entire line (\\Ba\\B / \\B@\\B)"
        "h": "presents at the beginning of a line (^a /^@)"
        "i": "presents at the end of a line (a$ / @$)"
        "j": "the entire line (^a$ / ^@$)"
        "k": "word char presents at the beginning of a word, unable to match the given non word char(\\<a  \\<@)"
        "l": "word char presents at the end of a word, unable to match the given non word char(a\\>, @\\>)"
        "m": "word char presents an entire word, unable to match the given non word char (\\<a\\> / \\<@\\>)"
        "n": "unable to match the given word char, non word char presents at the beginning of a word (a\\<, @\\<)"
        "o": "unable to match the given word char, non word char presents at the end of a word (\\>a, \\>@)"
        "p": "unable to match the given word char, non word char presents at the middle of two words (\\>a\\<, \\>@</)"
        "q": "unable to match the given word char, unable to match the given non word char (nowhere)"
        "r": "word char presents at the beginning of a word, non word char presents at the end of a word (\\ba \\b\\t)"
        "s": "word char presents at the end of a word, non word char presents at the beginning of a word (a\\b \\t\\b)"
        "t": "word char does not presents at the beginning of a word, non word char does not presents at the end of a word (\\Ba \\B\\t)"
        "u": "word char does not presents at the end of a word, non word char does not presents at the beginning of a word (a\\B \\t\\B)"
      "2":
        "a": "no"
        "b": "yes"
      "3":
        "a": "no"
        "b": "yes"
      "4":
        "*": "Any choice except NA"
        "a": "null/∅ (can't be any alphabet)"
        "b": "{V_A1/2} (a given alphabet V_A1/2)"
        "c": "{a, b, ..., z} (all the lower cases a-z)"
        "d": "{A, B, ..., Z} (all the upper cases A-Z)"
        "e": "{a, …, f, A, …, F}hexadecimal alphabets"
        "f": "{alpha1,….,alpha2} (a subrange of a-z)"
        "g": "{a, …, z, A, …, Z}"
        "h": "{ALPHA1,….,ALPHA2} (a subrange of A-Z)"
        "i": "{a, …, z, A, …, Z} - {a, …, f, A, …, F}hexadecimal alphabets"
        "j": "{a, …, z, A, …, Z} - {alpha1,….,alpha2} (the counter part of O-4f)"
        "k": "{V_A1/2}∪{a, …, z}"
        "l": "{V_A1/2}∪{A, …, Z}"
        "m": "{V_A1/2}∪{a, …, f, A, …, F}"
        "n": "{V_A1, V_A2}"
        "o": "{V_A1}∪ {alpha1,….,alpha2}"
        "p": "{a,…,z,A,…,F}"
        "q": "{a,…,f,A,…,Z}"
        "r": "{a, …, f, A, …, F}∪{alpha1,….,alpha2}"
        "s": "{alpha1,….,alpha2}∪{alpha1',….,alpha2'}"
        "t": "{a, …, z, A, …, Z} - {V_A1/2}"
        "u": "{a, …, z, A, …, Z} - {ALPHA1,….,ALPHA2} (the counter part of O-4t)"
        "v": "{alpha1,….,alpha2}∪{ALPHA1,….,ALPHA2}"
        "w": "{alpha1,….,alpha2}∪{A,…, Z}"
        "x": "{V_A1}∪ {ALPHA1,….,ALPHA2}"
        "y": "{ALPHA1,….,ALPHA2}∪{a,…,z}"
        "z": "{a, …, f, A, …, F}∪{ALPHA1,….,ALPHA2}"
        "aa": "{ALPHA1,….,ALPHA2}∪{ALPHA1',….,ALPHA2'}"
      "5":
        "*": "Any choice except NA"
        "a": "null/∅ (can't be any digit)"
        "b": "{V_D1/2} (a given digit V_D1/2)"
        "c": "{dig1, …, dig2} (a subrange of 0-9)"
        "d": "{0, …, 9}"
        "e": "{0, …, 9} - {V_D1}"
        "f": "{0, …, 9} - {dig1, …, dig2} (counterpar of O-5c)"
        "g": "{V_D1, V_D2}"
        "h": "{V_D1}∪{dig1, …, dig2}"
        "i": "{dig1, …, dig2} ∪ {dig1', …, dig2'}"
      "6":
