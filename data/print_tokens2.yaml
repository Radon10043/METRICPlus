profile:
  categories:
    I:
      "1": "Number Of Input Files"
      "2": "Characteristic of Input File"
      "3": "Part 1_content of c1"
      "4": "Part 1_p1 and s1"
      "5": "Part 2_Separator(sp):"
      "6": "Part 3_content of c2"
      "7": "Part 3_p2 and s2"
    O:
      "1": "Type of output"
      "2": "structure of output"
      "3": "Type of token-1st"
      "4": "Type of token-2nd"
      "5": "Type of token-3rd"
      "6": "Content of c1"
      "7": "content of sp"
      "8": "content of c2"
      "9": "quotation marks for c1"
      "10": "quotation marks for c2"
  choices:
    I:
      "1":
        "a": "1"
        "b": "n(n>1)"
      "2":
        "*": "Any choice except NA"
        "a": "Does not exist"
        "b": "Exist but empty"
        "c": "Exist and not empty"
      "3":
        "*": "Any choice except NA"
        "a": "\"\"/null"
        "b": "a fixed key word (K)"
        "c": "a fixed identifier (I)"
        "d": "a fixed numeric (N)"
        "e": "a fixed character (C)  (e.g., #1, #s, #%)"
        "f": "a fixed alphanumeric string of error type (E)"
      "4":
        "*": "Any choice except NA"
        "a": "p1=null s1=null"
        "b": "p1=\"    s1=\""
        "c": "p1=\"    s1=null"
        "d": "p1=null s1=\""
      "5":
        "*": "Any choice except NA"
        "a": "null (no separator)"
        "b": "a fixed separator selected from all valid separators. \"(\"、\")\"、\"[\"、\"]\"、\"'\"、\"`\"、\",\"."
        "c": "\" \" (a blank separator)"
        "d": "\";\""
        "e": "\\n"
      "6":
        "*": "Any choice except NA"
        "a": "\"\"/null"
        "b": "a fixed key word (K)"
        "c": "a fixed identifier (I)"
        "d": "a fixed numeric (N)"
        "e": "a fixed character (C)  (e.g., #1, #s, #%)"
        "f": "a fixed alphanumeric string of error type (E)"
      "7":
        "*": "Any choice except NA"
        "a": "p2=null s2=null"
        "b": "p2=\"    s2=\""
        "c": "p2=\"    s2=null"
        "d": "p2=null s2=\""
    O:
      "1":
        "a": "The usage of printtokes"
        "b": "File does not exist"
        "c": "Token identification result + eof."
      "2":
        "*": "Any choice except NA"
        "a": "null"
        "b": "token-1st=c2"
        "c": "token-1st=sp"
        "d": "token-1st=c1"
        "e": "token-1st=c1+sp"
        "f": "token-1st=c1+sp+c2"
        "h": "token-1st=sp, token-2nd=c2"
        "i": "token-1st=c1, token-2nd=c2"
        "k": "token-1st=c1, token-2nd=sp"
        "m": "token-1st=c1+sp, token-2nd=c2"
        "r": "token-1st=c1, token-2nd=sp, token-3nd=c2"
      "3":
        "*": "Any choice except NA"
        "a": "keyword"
        "b": "identifier"
        "c": "numeric"
        "d": "character"
        "e": "error"
        "f": "string"
        "g": "name of one of the valid separators"
      "4":
        "*": "Any choice except NA"
        "a": "keyword"
        "b": "identifier"
        "c": "numeric"
        "d": "character"
        "e": "error"
        "f": "string"
        "g": "name of one of the valid separators"
      "5":
        "*": "Any choice except NA"
        "a": "keyword"
        "b": "identifier"
        "c": "numeric"
        "d": "character"
        "e": "error"
        "f": "string"
      "6":
        "*": "Any choice except NA"
        "a": "\"\" (the program outputs nothing)"
        "b": "K"
        "c": "I"
        "d": "N"
        "e": "C"
        "f": "E"
        "g": "#C"
      "7":
        "*": "Any choice except NA"
        "a": "null"
        "b": "name of one of the valid separators"
        "f": "symbol of one of the valid separators"
        "g": "\" \" (space)"
        "h": "\";\""
      "8":
        "*": "Any choice except NA"
        "a": "\"\" (the program outputs nothing)"
        "b": "K"
        "c": "I"
        "d": "N"
        "e": "C"
        "f": "E"
        "g": "#C"
      "9":
        "*": "Any choice except NA"
        "a": "no quotation mark"
        "b": "\" + c1"
        "c": "c1 + \""
      "10":
        "*": "Any choice except NA"
        "a": "no quotation mark"
        "b": "\" + c2"
        "c": "c2 + \""
        "d": "\" + c2 + \""
